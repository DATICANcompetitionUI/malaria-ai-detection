[theme]
base = "dark"
primaryColor = "#64ffda"
backgroundColor = "#0d0d1a"
secondaryBackgroundColor = "#16213e"
textColor = "#D8DEE9"
font = "sans serif"

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
fastReruns = true
